name: ruff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.10 --extra dev

      - run: uv run --no-sync ruff check ./graphqomb ./tests ./examples

      - run: uv run --no-sync ruff format --check --diff

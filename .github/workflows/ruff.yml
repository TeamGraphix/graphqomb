name: ruff

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.10 --extra dev

      - run: uv run ruff check ./graphqomb ./tests ./examples

      - run: uv run ruff format --check --diff

name: Type Checking

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        tool: [mypy, pyright]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: "3.10"

      - uses: astral-sh/setup-uv@v9.0.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.10 --extra dev --extra stim

      - run: uv run --no-sync ${{ matrix.tool }}

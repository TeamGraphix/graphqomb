name: doc

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-doc:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.13 --extra doc

      - name: Make docs
        run: uv run sphinx-build -W docs/source docs/build

      - name: Save docs
        uses: actions/upload-artifact@v7.0.1
        with:
          name: html-docs
          path: docs/build

  lint-text:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.12"

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.12 --extra dev

      - name: Run language-agnostic linters
        run: uv run pre-commit run --all-files

# This workflow will install Python dependencies, run tests and lint with a single version of Python
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: pytest

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  standard:
    strategy:
      fail-fast: false
      matrix:
        os: ["ubuntu-latest", "windows-latest", "macos-latest"]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    name: "Python ${{ matrix.python }} / ${{ matrix.os }}"
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python ${{ matrix.python }} --extra dev --extra stim

      - run: uv run --no-sync pytest -m "not pyzx"

  pyzx-integration:
    name: "PyZX integration / Python 3.13 / ubuntu-latest"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          uv-version: "0.11.16"
          enable-cache: true

      - run: uv sync --locked --python 3.13 --extra dev --extra pyzx --extra stim

      - run: uv run --no-sync pytest -m pyzx
